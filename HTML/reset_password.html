<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - MealHaven</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* color palette */
      :root {
        --primary: #22c55e;
        --primary-dark: #16a34a;
        --primary-light: rgba(34, 197, 94, 0.1);
        --secondary: #f97316;
        --accent: #3b82f6;
        --text: #1e293b;
        --text-light: #64748b;
        --background: #ffffff;
        --surface: #f8fafc;
        --border: #e2e8f0;
        --border-light: #f1f5f9;
        --error: #ef4444;
        --success: #10b981;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --radius: 12px;
        --transition: all 0.2s ease;
      }

      /* base styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
        line-height: 1.6;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* card container */
      .card {
        background: var(--background);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 440px;
        padding: 40px;
      }

      /* header */
      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      /* logo container */
      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .logo {
        width: 56px;
        height: 56px;
      }

      .brand {
        font-weight: 800;
        font-size: 24px;
        letter-spacing: -0.5px;
      }

      .brand .meal {
        color: var(--primary);
      }

      .brand .haven {
        color: var(--secondary);
      }

      .title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text);
      }

      .subtitle {
        color: var(--text-light);
        font-size: 15px;
      }

      /* form */
      .form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .input-container {
        position: relative;
      }

      .input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--input);
        font-size: 15px;
        font-family: inherit;
        color: var(--text);
        transition: var(--transition);
      }

      .input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }

      .input::placeholder {
        color: #94a3b8;
      }

      /* password toggle */
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--text-light);
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .password-toggle:hover {
        color: var(--text);
        background: rgba(0, 0, 0, 0.05);
      }

      .password-toggle svg {
        width: 18px;
        height: 18px;
      }

      /* password strength */
      .password-strength {
        width: 100%;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 8px;
        overflow: hidden;
      }

      .password-strength-meter {
        height: 100%;
        width: 0;
        transition: all 0.3s ease;
        border-radius: 2px;
      }

      .password-strength-meter.strength-weak {
        width: 25%;
        background: var(--error);
      }

      .password-strength-meter.strength-fair {
        width: 50%;
        background: #f59e0b;
      }

      .password-strength-meter.strength-good {
        width: 75%;
        background: #3b82f6;
      }

      .password-strength-meter.strength-strong {
        width: 100%;
        background: var(--success);
      }

      /* submit button */
      .submit-btn {
        margin-top: 8px;
        padding: 14px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      /* error message */
      .error-message {
        color: var(--error);
        font-size: 13px;
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .error-message.hidden {
        display: none;
      }

      /* footer */
      .footer {
        text-align: center;
        color: var(--text-light);
        font-size: 14px;
        margin-top: 24px;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      /* responsive */
      @media (max-width: 480px) {
        .card {
          padding: 28px 24px;
        }

        .title {
          font-size: 22px;
        }

        .subtitle {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <header class="header">
        <!-- logo and brand -->
        <div class="logo-container">
          <svg
            class="logo"
            viewBox="0 0 128 128"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- leaf -->
            <path
              d="M92 16c12 2 22 10 26 18-8 6-20 10-36 10-10 0-20-2-28-6 8-14 22-23 38-22z"
              fill="#22c55e"
              opacity="0.9"
            />
            <!-- roof -->
            <path d="M16 56l48-28 48 28v10l-48-26-48 26V56z" fill="#22c55e" />
            <!-- house -->
            <path
              d="M28 58h72v50a6 6 0 0 1-6 6H34a6 6 0 0 1-6-6V58z"
              fill="#f97316"
              opacity="0.9"
            />
            <!-- door -->
            <path
              d="M56 88a8 8 0 0 1 16 0v26H56V88z"
              fill="#1e293b"
              opacity="0.85"
            />
            <!-- windows -->
            <g fill="#1e293b" opacity="0.85">
              <rect x="44" y="66" width="10" height="10" rx="1.5" />
              <rect x="58" y="66" width="10" height="10" rx="1.5" />
            </g>
            <!-- fork -->
            <path
              d="M40 106V70c0-1.7 1.3-3 3-3s3 1.3 3 3v8h2v-8c0-1.7 1.3-3 3-3s3 1.3 3 3v36h-14z"
              fill="#1e293b"
              opacity="0.85"
            />
            <!-- spoon -->
            <path
              d="M82 70c0-4.4 3.6-8 8-8s8 3.6 8 8c0 3.2-1.8 6-4.4 7.3V106H86V77.3c-2.6-1.3-4.4-4.1-4.4-7.3z"
              fill="#1e293b"
              opacity="0.85"
            />
          </svg>
          <div class="brand">
            <span class="meal">MEAL</span> <span class="haven">HAVEN</span>
          </div>
        </div>

        <h1 class="title">Reset password</h1>
        <p class="subtitle">Enter your new password</p>
      </header>

      <!-- reset form -->
      <form
        class="form"
        id="reset-form"
        action="../PHP/reset_password.php"
        method="POST"
        novalidate
      >
        <!-- hidden token -->
        <input type="hidden" name="token" id="reset-token" />

        <!-- new password -->
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <div class="input-container">
            <input
              type="password"
              id="password"
              name="password"
              class="input"
              placeholder="Create a new password"
              required
              minlength="8"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle"
              id="toggle-password"
              aria-label="Show password"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <!-- password strength -->
          <div class="password-strength">
            <div
              class="password-strength-meter"
              id="password-strength-meter"
            ></div>
          </div>
          <div class="error-message hidden" id="password-error"></div>
        </div>

        <!-- confirm password -->
        <div class="form-group">
          <label class="form-label" for="confirm-password"
            >Confirm Password</label
          >
          <div class="input-container">
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              class="input"
              placeholder="Confirm your new password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle"
              id="toggle-confirm"
              aria-label="Show password"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div class="error-message hidden" id="confirm-error"></div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Reset Password
        </button>
      </form>

      <p class="footer">
        <a href="main_website.html">← Back to Login</a>
      </p>
    </div>

    <script>
      // get token from url
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");
      if (token) {
        document.getElementById("reset-token").value = token;
      }

      // password visibility toggle
      function setupPasswordToggle(toggleId, inputId) {
        const toggle = document.getElementById(toggleId);
        const input = document.getElementById(inputId);

        if (!toggle || !input) return;

        toggle.addEventListener("click", () => {
          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";

          const icon = toggle.querySelector("svg");
          if (isPassword) {
            toggle.setAttribute("aria-label", "Hide password");
            icon.innerHTML = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          } else {
            toggle.setAttribute("aria-label", "Show password");
            icon.innerHTML = `<path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          }
        });
      }

      setupPasswordToggle("toggle-password", "password");
      setupPasswordToggle("toggle-confirm", "confirm-password");

      // password strength checker
      const passwordInput = document.getElementById("password");
      const strengthMeter = document.getElementById("password-strength-meter");

      if (passwordInput && strengthMeter) {
        passwordInput.addEventListener("input", function () {
          const value = this.value;
          let strength = 0;

          // calculate strength
          if (value.length >= 8) strength++;
          if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength++;
          if (value.match(/\d/)) strength++;
          if (value.match(/[^a-zA-Z\d]/)) strength++;

          // update meter
          strengthMeter.className = "password-strength-meter";
          if (value.length > 0) {
            if (strength <= 1) strengthMeter.classList.add("strength-weak");
            else if (strength === 2)
              strengthMeter.classList.add("strength-fair");
            else if (strength === 3)
              strengthMeter.classList.add("strength-good");
            else strengthMeter.classList.add("strength-strong");
          }
        });
      }

      // form validation
      const form = document.getElementById("reset-form");
      form.addEventListener("submit", function (e) {
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm-password").value;

        if (password !== confirm) {
          e.preventDefault();
          const confirmError = document.getElementById("confirm-error");
          confirmError.textContent = "Passwords do not match";
          confirmError.classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
