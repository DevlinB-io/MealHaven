<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - MealHaven</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../CSS/reset_password.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="card">
      <header class="header">
        <div class="logo-container">
          <svg
            class="logo"
            viewBox="0 0 128 128"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M92 16c12 2 22 10 26 18-8 6-20 10-36 10-10 0-20-2-28-6 8-14 22-23 38-22z"
              fill="#22c55e"
              opacity="0.9"
            />
            <path d="M16 56l48-28 48 28v10l-48-26-48 26V56z" fill="#22c55e" />
            <path
              d="M28 58h72v50a6 6 0 0 1-6 6H34a6 6 0 0 1-6-6V58z"
              fill="#f97316"
              opacity="0.9"
            />
            <path
              d="M56 88a8 8 0 0 1 16 0v26H56V88z"
              fill="#1e293b"
              opacity="0.85"
            />
            <g fill="#1e293b" opacity="0.85">
              <rect x="44" y="66" width="10" height="10" rx="1.5" />
              <rect x="58" y="66" width="10" height="10" rx="1.5" />
            </g>
            <path
              d="M40 106V70c0-1.7 1.3-3 3-3s3 1.3 3 3v8h2v-8c0-1.7 1.3-3 3-3s3 1.3 3 3v36h-14z"
              fill="#1e293b"
              opacity="0.85"
            />
            <path
              d="M82 70c0-4.4 3.6-8 8-8s8 3.6 8 8c0 3.2-1.8 6-4.4 7.3V106H86V77.3c-2.6-1.3-4.4-4.1-4.4-7.3z"
              fill="#1e293b"
              opacity="0.85"
            />
          </svg>
          <div class="brand">
            <span class="meal">MEAL</span> <span class="haven">HAVEN</span>
          </div>
        </div>
        <h1 class="title">Reset password</h1>
        <p class="subtitle">Enter your new password</p>
      </header>
      <form
        class="form"
        id="reset-form"
        action="../PHP/reset_password.php"
        method="POST"
        novalidate
      >
        <input type="hidden" name="token" id="reset-token" />

        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <div class="input-container">
            <input
              type="password"
              id="password"
              name="password"
              class="input"
              placeholder="Create a new password"
              required
              minlength="8"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle"
              id="toggle-password"
              aria-label="Show password"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div class="password-strength">
            <div
              class="password-strength-meter"
              id="password-strength-meter"
            ></div>
          </div>
          <div class="error-message hidden" id="password-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password"
            >Confirm Password</label
          >
          <div class="input-container">
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              class="input"
              placeholder="Confirm your new password"
              required
              autocomplete="new-password"
            />
            <button
              type="button"
              class="password-toggle"
              id="toggle-confirm"
              aria-label="Show password"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div class="error-message hidden" id="confirm-error"></div>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">
          Reset Password
        </button>
      </form>
      <p class="footer">
        <a href="main_website.html">← Back to Login</a>
      </p>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");
      if (token) {
        document.getElementById("reset-token").value = token;
      }

      function setupPasswordToggle(toggleId, inputId) {
        const toggle = document.getElementById(toggleId);
        const input = document.getElementById(inputId);

        if (!toggle || !input) return;

        toggle.addEventListener("click", () => {
          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";

          const icon = toggle.querySelector("svg");
          if (isPassword) {
            toggle.setAttribute("aria-label", "Hide password");

            icon.innerHTML = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          } else {
            toggle.setAttribute("aria-label", "Show password");
            icon.innerHTML = `<path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                     <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          }
        });
      }

      setupPasswordToggle("toggle-password", "password");
      setupPasswordToggle("toggle-confirm", "confirm-password");

      const passwordInput = document.getElementById("password");
      const strengthMeter = document.getElementById("password-strength-meter");

      if (passwordInput && strengthMeter) {
        passwordInput.addEventListener("input", function () {
          const value = this.value;
          let strength = 0;

          if (value.length >= 8) strength++;
          if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength++;
          if (value.match(/\d/)) strength++;
          if (value.match(/[^a-zA-Z\d]/)) strength++;

          strengthMeter.className = "password-strength-meter";
          if (value.length > 0) {
            if (strength <= 1) strengthMeter.classList.add("strength-weak");
            else if (strength === 2)
              strengthMeter.classList.add("strength-fair");
            else if (strength === 3)
              strengthMeter.classList.add("strength-good");
            else strengthMeter.classList.add("strength-strong");
          }
        });
      }
      const form = document.getElementById("reset-form");
      form.addEventListener("submit", function (e) {
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm-password").value;

        if (password !== confirm) {
          e.preventDefault();
          const confirmError = document.getElementById("confirm-error");
          confirmError.textContent = "Passwords do not match";
          confirmError.classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
