<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - MealHaven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        background: white;
        padding: 3rem;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }

      .brand {
        text-align: center;
        margin-bottom: 2rem;
      }

      .logo {
        width: 60px;
        height: 60px;
        background: #2ecc71;
        border-radius: 12px;
        margin: 0 auto 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 1.5rem;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 0.5rem;
      }

      .tagline {
        color: #7f8c8d;
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #2c3e50;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #e9ecef;
        border-radius: 6px;
        font-size: 1rem;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #2ecc71;
      }

      .btn {
        width: 100%;
        padding: 0.75rem;
        background: #2ecc71;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }

      .btn:hover {
        background: #27ae60;
      }

      .error-message {
        background: #e74c3c;
        color: white;
        padding: 0.75rem;
        border-radius: 6px;
        margin-top: 1rem;
        text-align: center;
        display: none;
      }

      .back-link {
        text-align: center;
        margin-top: 1.5rem;
      }

      .back-link a {
        color: #7f8c8d;
        text-decoration: none;
      }

      .back-link a:hover {
        color: #2c3e50;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="brand">
        <div class="logo">MH</div>
        <h1>MealHaven</h1>
        <span class="tagline">Admin Portal</span>
      </div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="admin@mealhaven.com"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="••••••••"
          />
        </div>

        <button type="submit" class="btn">Login as Admin</button>

        <div id="errorMessage" class="error-message"></div>
      </form>

      <div class="back-link">
        <a href="main_website.html">← Back to Main Site</a>
      </div>
    </div>

    <script>
      document
        .getElementById("adminLoginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const errorMessage = document.getElementById("errorMessage");

          try {
            const response = await fetch("../PHP/admin_login.php", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, password }),
            });

            const result = await response.json();

            if (result.success) {
              // Store admin session
              localStorage.setItem("admin_logged_in", "true");
              localStorage.setItem("admin_user_id", result.user_id);
              localStorage.setItem("admin_name", result.name);

              // Redirect to admin dashboard
              window.location.href = "admin_dashboard.html";
            } else {
              errorMessage.textContent = result.error || "Login failed";
              errorMessage.style.display = "block";
            }
          } catch (error) {
            errorMessage.textContent = "Network error. Please try again.";
            errorMessage.style.display = "block";
          }
        });
    </script>
  </body>
</html>
