<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - MealHaven</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../CSS/admin_login.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="food-background">
      <div class="food-item food-1"></div>
      <div class="food-item food-2"></div>
      <div class="food-item food-3"></div>
      <div class="food-item food-4"></div>
      <div class="food-item food-5"></div>
      <div class="food-pattern"></div>
    </div>
    <div class="container">
      <div class="card">
        <div class="card-content">
          <header class="header">
            <div class="logo-container">
              <svg
                class="logo"
                viewBox="0 0 128 128"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <defs>
                  <filter
                    id="soft-glow-green"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                  <filter
                    id="soft-glow-orange"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>
                <path
                  d="M92 16c12 2 22 10 26 18-8 6-20 10-36 10-10 0-20-2-28-6 8-14 22-23 38-22z"
                  fill="#22c55e"
                  opacity="0.9"
                  filter="url(#soft-glow-green)"
                />
                <path
                  d="M16 56l48-28 48 28v10l-48-26-48 26V56z"
                  fill="#22c55e"
                />
                <path
                  d="M28 58h72v50a6 6 0 0 1-6 6H34a6 6 0 0 1-6-6V58z"
                  fill="#f97316"
                  opacity="0.9"
                  filter="url(#soft-glow-orange)"
                />
                <path
                  d="M56 88a8 8 0 0 1 16 0v26H56V88z"
                  fill="#1e293b"
                  opacity="0.85"
                />
                <g fill="#1e293b" opacity="0.85">
                  <rect x="44" y="66" width="10" height="10" rx="1.5" />
                  <rect x="58" y="66" width="10" height="10" rx="1.5" />
                </g>
                <path
                  d="M40 106V70c0-1.7 1.3-3 3-3s3 1.3 3 3v8h2v-8c0-1.7 1.3-3 3-3s3 1.3 3 3v36h-14z"
                  fill="#1e293b"
                  opacity="0.85"
                />
                <path
                  d="M82 70c0-4.4 3.6-8 8-8s8 3.6 8 8c0 3.2-1.8 6-4.4 7.3V106H86V77.3c-2.6-1.3-4.4-4.1-4.4-7.3z"
                  fill="#1e293b"
                  opacity="0.85"
                />
              </svg>
              <div class="brand">
                <span class="meal">MEAL</span>
                <span class="haven">HAVEN</span>
              </div>
            </div>
            <h1 class="title">Admin Portal</h1>
            <p class="subtitle">Sign in to access the admin dashboard</p>
          </header>
          <form class="form" id="adminLoginForm" novalidate>
            <div class="form-group">
              <label class="form-label" for="email">Admin Email</label>
              <div class="input-container">
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="input"
                  placeholder="admin@mealhaven.com"
                  required
                  autocomplete="email"
                />
              </div>
              <div class="error-message hidden" id="email-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="input-container">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="input"
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  id="toggle-password"
                  aria-label="Show password"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
              </div>
              <div class="error-message hidden" id="password-error"></div>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">
              Login as Admin
            </button>
            <div class="error-message hidden" id="form-error"></div>
          </form>
          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Back to regular login</div>
            <div class="divider-line"></div>
          </div>
          <a href="login.html" class="alt-action">User Login</a>
          <p class="footer">
            By signing in, you agree to our <a href="terms.html">Terms</a> and
            <a href="privacy.html">Privacy Policy</a>.
          </p>
        </div>
      </div>
    </div>
    <script>
      const togglePassword = document.getElementById("toggle-password");
      const passwordInput = document.getElementById("password");

      function togglePasswordVisibility() {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";

        const icon = togglePassword.querySelector("svg");
        if (isPassword) {
          togglePassword.setAttribute("aria-label", "Hide password");
          icon.innerHTML = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                 <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                 <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                 <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
        } else {
          togglePassword.setAttribute("aria-label", "Show password");
          icon.innerHTML = `<path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                 <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
        }
      }

      togglePassword.addEventListener("click", togglePasswordVisibility);

      const form = document.getElementById("adminLoginForm");
      const submitBtn = document.getElementById("submit-btn");
      const formError = document.getElementById("form-error");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        let isValid = true;

        const email = document.getElementById("email");
        const emailError = document.getElementById("email-error");
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email.value.trim()) {
          showError(email, emailError, "Email is required");
          isValid = false;
        } else if (!emailRegex.test(email.value)) {
          showError(email, emailError, "Please enter a valid email address");
          isValid = false;
        } else {
          clearError(email, emailError);
        }

        const password = document.getElementById("password");
        const passwordError = document.getElementById("password-error");
        if (!password.value) {
          showError(password, passwordError, "Password is required");
          isValid = false;
        } else {
          clearError(password, passwordError);
        }

        if (isValid) {
          submitBtn.classList.add("loading");
          submitBtn.textContent = "Signing In...";

          try {
            const response = await fetch("../PHP/admin_login.php", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email: email.value,
                password: password.value,
              }),
            });

            const result = await response.json();

            if (result.success) {
              localStorage.setItem("admin_logged_in", "true");
              localStorage.setItem("admin_user_id", result.user_id);
              localStorage.setItem("admin_name", result.name);

              window.location.href = "admin_dashboard.html";
            } else {
              showFormError(result.error || "Login failed");
            }
          } catch (error) {
            showFormError("Network error. Please try again.");
          } finally {
            submitBtn.classList.remove("loading");
            submitBtn.textContent = "Login as Admin";
          }
        }
      });
      function showError(input, errorElement, message) {
        input.classList.add("error");
        errorElement.textContent = message;
        errorElement.classList.remove("hidden");
        hideFormError();
      }
      function clearError(input, errorElement) {
        input.classList.remove("error");
        errorElement.classList.add("hidden");
        hideFormError();
      }
      function showFormError(message) {
        formError.textContent = message;
        formError.classList.remove("hidden");
      }
      function hideFormError() {
        formError.classList.add("hidden");
      }
      const inputs = document.querySelectorAll(".input");
      inputs.forEach((input) => {
        input.addEventListener("blur", function () {
          const event = new Event("submit", { cancelable: true });
          form.dispatchEvent(event);
        });
      });
    </script>
  </body>
</html>
