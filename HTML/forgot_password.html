<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - MealHaven</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../CSS/forgot_password.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="food-background">
      <div class="food-item food-1"></div>
      <div class="food-item food-2"></div>
      <div class="food-item food-3"></div>
      <div class="food-item food-4"></div>
      <div class="food-item food-5"></div>
      <div class="food-pattern"></div>
    </div>
    <div class="container">
      <div class="card">
        <div class="card-content">
          <header class="header">
            <div class="logo-container">
              <svg
                class="logo"
                viewBox="0 0 128 128"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <defs>
                  <filter
                    id="soft-glow-green"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                  <filter
                    id="soft-glow-orange"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>
                <path
                  d="M92 16c12 2 22 10 26 18-8 6-20 10-36 10-10 0-20-2-28-6 8-14 22-23 38-22z"
                  fill="#22c55e"
                  opacity="0.9"
                  filter="url(#soft-glow-green)"
                />
                <path
                  d="M16 56l48-28 48 28v10l-48-26-48 26V56z"
                  fill="#22c55e"
                />
                <path
                  d="M28 58h72v50a6 6 0 0 1-6 6H34a6 6 0 0 1-6-6V58z"
                  fill="#f97316"
                  opacity="0.9"
                  filter="url(#soft-glow-orange)"
                />
                <path
                  d="M56 88a8 8 0 0 1 16 0v26H56V88z"
                  fill="#1e293b"
                  opacity="0.85"
                />
                <g fill="#1e293b" opacity="0.85">
                  <rect x="44" y="66" width="10" height="10" rx="1.5" />
                  <rect x="58" y="66" width="10" height="10" rx="1.5" />
                </g>
                <path
                  d="M40 106V70c0-1.7 1.3-3 3-3s3 1.3 3 3v8h2v-8c0-1.7 1.3-3 3-3s3 1.3 3 3v36h-14z"
                  fill="#1e293b"
                  opacity="0.85"
                />
                <path
                  d="M82 70c0-4.4 3.6-8 8-8s8 3.6 8 8c0 3.2-1.8 6-4.4 7.3V106H86V77.3c-2.6-1.3-4.4-4.1-4.4-7.3z"
                  fill="#1e293b"
                  opacity="0.85"
                />
              </svg>
              <div class="brand">
                <span class="meal">MEAL</span>
                <span class="haven">HAVEN</span>
              </div>
            </div>
            <h1 class="title">Reset your password</h1>
            <p class="subtitle">
              Enter your email address and we'll send you instructions to reset
              your password.
            </p>
          </header>
          <div class="success-message" id="success-message">
            <div class="success-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M20 6L9 17L4 12"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <p class="success-text">
              <strong>Check your email</strong><br />
              We've sent password reset instructions to your email address.
            </p>
          </div>
          <form action="../PHP/forgot_password.php" method="POST">
            <div class="form-group">
              <label class="form-label" for="email">Email address</label>
              <div class="input-container">
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="input"
                  placeholder="your.email@example.com"
                  required
                  autocomplete="email"
                />
              </div>
              <div class="error-message hidden" id="email-error"></div>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">
              Send Reset Instructions
            </button>
          </form>
          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Remember your password?</div>
            <div class="divider-line"></div>
          </div>
          <div class="alt-actions">
            <a href="login.html" class="alt-action">Back to Sign In</a>
          </div>
          <p class="footer">
            Need help?
            <a href="mailto:support@mealhaven.com">Contact our support team</a>
          </p>
        </div>
      </div>
    </div>
    <script>
      const form = document.getElementById("forgot-password-form");
      const submitBtn = document.getElementById("submit-btn");
      const successMessage = document.getElementById("success-message");

      form.addEventListener("submit", function (e) {
        let isValid = true;

        const email = document.getElementById("email");
        const emailError = document.getElementById("email-error");
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email.value.trim()) {
          showError(email, emailError, "Email is required");
          isValid = false;
        } else if (!emailRegex.test(email.value)) {
          showError(email, emailError, "Please enter a valid email address");
          isValid = false;
        } else {
          clearError(email, emailError);
        }
        if (isValid) {
          submitBtn.classList.add("loading");
          submitBtn.textContent = "Sending...";
          setTimeout(() => {
            form.style.display = "none";
            successMessage.classList.add("visible");
            submitBtn.classList.remove("loading");
            submitBtn.textContent = "Send Reset Instructions";
          }, 1500);
        }
      });
      function showError(input, errorElement, message) {
        input.classList.add("error");
        errorElement.textContent = message;
        errorElement.classList.remove("hidden");
      }
      function clearError(input, errorElement) {
        input.classList.remove("error");
        errorElement.classList.add("hidden");
      }
      const inputs = document.querySelectorAll(".input");
      inputs.forEach((input) => {
        input.addEventListener("blur", function () {
          const event = new Event("submit", { cancelable: true });
          form.dispatchEvent(event);
        });
      });
    </script>
  </body>
</html>
