<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - MealHaven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Modern color palette */
      :root {
        --primary: #22c55e;
        --primary-dark: #16a34a;
        --primary-light: rgba(34, 197, 94, 0.1);
        --secondary: #f97316;
        --accent: #3b82f6;
        --text: #1e293b;
        --text-light: #64748b;
        --background: #ffffff;
        --surface: #f8fafc;
        --border: #e2e8f0;
        --border-light: #f1f5f9;
        --error: #ef4444;
        --success: #10b981;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --radius: 12px;
        --transition: all 0.2s ease;
      }

      /* Base styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
        line-height: 1.6;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Food-themed background */
      .food-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        overflow: hidden;
      }

      .food-item {
        position: absolute;
        border-radius: 50%;
        opacity: 0.08;
      }

      .food-1 {
        width: 120px;
        height: 120px;
        background: radial-gradient(
          circle,
          var(--primary) 20%,
          transparent 70%
        );
        top: 10%;
        right: 10%;
      }

      .food-2 {
        width: 80px;
        height: 80px;
        background: radial-gradient(
          circle,
          var(--secondary) 20%,
          transparent 70%
        );
        bottom: 15%;
        left: 10%;
      }

      .food-3 {
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, #f59e0b 20%, transparent 70%);
        top: 60%;
        right: 15%;
      }

      .food-4 {
        width: 60px;
        height: 60px;
        background: radial-gradient(circle, #ef4444 20%, transparent 70%);
        top: 20%;
        left: 15%;
      }

      .food-5 {
        width: 90px;
        height: 90px;
        background: radial-gradient(circle, #8b5cf6 20%, transparent 70%);
        bottom: 20%;
        right: 20%;
      }

      /* Food pattern overlay */
      .food-pattern {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
            circle at 20% 30%,
            rgba(34, 197, 94, 0.05) 2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(249, 115, 22, 0.05) 2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 40% 80%,
            rgba(245, 158, 11, 0.05) 2px,
            transparent 2px
          );
        background-size: 100px 100px, 150px 150px, 80px 80px;
      }

      /* Main container */
      .container {
        width: 100%;
        max-width: 420px;
      }

      /* Card styling */
      .card {
        background: var(--background);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .card-content {
        padding: 44px;
      }

      /* Header section */
      .header {
        text-align: center;
        margin-bottom: 36px;
      }

      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 28px;
      }

      .logo {
        width: 72px;
        height: 72px;
        flex: 0 0 72px;
      }

      .brand {
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -0.5px;
      }

      .brand .meal {
        color: var(--primary);
      }

      .brand .haven {
        color: var(--secondary);
      }

      .title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .subtitle {
        color: var(--text-light);
        font-size: 16px;
        line-height: 1.5;
      }

      /* Form styling */
      .form {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .input-container {
        position: relative;
      }

      .input {
        width: 100%;
        padding: 15px 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        font-family: inherit;
        transition: var(--transition);
      }

      .input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
        background: white;
      }

      .input:not(:placeholder-shown) {
        border-color: var(--primary);
      }

      .input::placeholder {
        color: #94a3b8;
      }

      /* Success message */
      .success-message {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 20px;
        display: none;
      }

      .success-message.visible {
        display: block;
      }

      .success-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background: var(--success);
        border-radius: 50%;
        margin: 0 auto 12px;
      }

      .success-text {
        text-align: center;
        color: var(--text);
        font-size: 15px;
        line-height: 1.5;
      }

      /* Form validation */
      .input.error {
        border-color: var(--error);
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
      }

      .error-message {
        color: var(--error);
        font-size: 12px;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .error-message.hidden {
        display: none;
      }

      /* Submit button */
      .submit-btn {
        width: 100%;
        margin-top: 12px;
        padding: 16px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(34, 197, 94, 0.4);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .submit-btn.loading {
        pointer-events: none;
        opacity: 0.8;
      }

      .submit-btn.loading::after {
        content: "";
        width: 16px;
        height: 16px;
        border: 2px solid transparent;
        border-top: 2px solid currentColor;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        margin: 30px 0;
      }

      .divider-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border),
          transparent
        );
      }

      .divider-text {
        padding: 0 16px;
        color: var(--text-light);
        font-size: 14px;
        white-space: nowrap;
      }

      /* Alternative actions */
      .alt-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .alt-action {
        display: block;
        text-align: center;
        padding: 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-weight: 600;
        text-decoration: none;
        transition: var(--transition);
      }

      .alt-action:hover {
        background: white;
        border-color: var(--primary);
        transform: translateY(-1px);
      }

      /* Footer */
      .footer {
        text-align: center;
        color: var(--text-light);
        font-size: 14px;
        margin-top: 28px;
        line-height: 1.5;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      /* Mobile responsiveness */
      @media (max-width: 480px) {
        .card-content {
          padding: 32px 24px;
        }

        .brand {
          font-size: 24px;
        }

        .title {
          font-size: 24px;
        }

        .logo {
          width: 60px;
          height: 60px;
        }

        .food-item {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Food-themed background -->
    <div class="food-background">
      <div class="food-item food-1"></div>
      <div class="food-item food-2"></div>
      <div class="food-item food-3"></div>
      <div class="food-item food-4"></div>
      <div class="food-item food-5"></div>
      <div class="food-pattern"></div>
    </div>

    <div class="container">
      <div class="card">
        <div class="card-content">
          <header class="header">
            <div class="logo-container">
              <!-- MealHaven Logo -->
              <svg
                class="logo"
                viewBox="0 0 128 128"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <defs>
                  <filter
                    id="soft-glow-green"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                  <filter
                    id="soft-glow-orange"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>
                <!-- Leaf -->
                <path
                  d="M92 16c12 2 22 10 26 18-8 6-20 10-36 10-10 0-20-2-28-6 8-14 22-23 38-22z"
                  fill="#22c55e"
                  opacity="0.9"
                  filter="url(#soft-glow-green)"
                />
                <!-- Roof -->
                <path
                  d="M16 56l48-28 48 28v10l-48-26-48 26V56z"
                  fill="#22c55e"
                />
                <!-- House body -->
                <path
                  d="M28 58h72v50a6 6 0 0 1-6 6H34a6 6 0 0 1-6-6V58z"
                  fill="#f97316"
                  opacity="0.9"
                  filter="url(#soft-glow-orange)"
                />
                <!-- Door -->
                <path
                  d="M56 88a8 8 0 0 1 16 0v26H56V88z"
                  fill="#1e293b"
                  opacity="0.85"
                />
                <!-- Window -->
                <g fill="#1e293b" opacity="0.85">
                  <rect x="44" y="66" width="10" height="10" rx="1.5" />
                  <rect x="58" y="66" width="10" height="10" rx="1.5" />
                </g>
                <!-- Fork -->
                <path
                  d="M40 106V70c0-1.7 1.3-3 3-3s3 1.3 3 3v8h2v-8c0-1.7 1.3-3 3-3s3 1.3 3 3v36h-14z"
                  fill="#1e293b"
                  opacity="0.85"
                />
                <!-- Spoon -->
                <path
                  d="M82 70c0-4.4 3.6-8 8-8s8 3.6 8 8c0 3.2-1.8 6-4.4 7.3V106H86V77.3c-2.6-1.3-4.4-4.1-4.4-7.3z"
                  fill="#1e293b"
                  opacity="0.85"
                />
              </svg>
              <div class="brand">
                <span class="meal">MEAL</span>
                <span class="haven">HAVEN</span>
              </div>
            </div>
            <h1 class="title">Reset your password</h1>
            <p class="subtitle">
              Enter your email address and we'll send you instructions to reset
              your password.
            </p>
          </header>

          <!-- Success message (hidden by default) -->
          <div class="success-message" id="success-message">
            <div class="success-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M20 6L9 17L4 12"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <p class="success-text">
              <strong>Check your email</strong><br />
              We've sent password reset instructions to your email address.
            </p>
          </div>
          <!-- Forgot password -->
          <form action="../PHP/forgot_password.php" method="POST">
            <div class="form-group">
              <label class="form-label" for="email">Email address</label>
              <div class="input-container">
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="input"
                  placeholder="your.email@example.com"
                  required
                  autocomplete="email"
                />
              </div>
              <div class="error-message hidden" id="email-error"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
              Send Reset Instructions
            </button>
          </form>

          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Remember your password?</div>
            <div class="divider-line"></div>
          </div>

          <div class="alt-actions">
            <a href="login.html" class="alt-action">Back to Sign In</a>
          </div>

          <p class="footer">
            Need help?
            <a href="mailto:support@mealhaven.com">Contact our support team</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      // Form validation and submission
      const form = document.getElementById("forgot-password-form");
      const submitBtn = document.getElementById("submit-btn");
      const successMessage = document.getElementById("success-message");

      form.addEventListener("submit", function (e) {
        // Basic validation
        let isValid = true;

        // Validate email
        const email = document.getElementById("email");
        const emailError = document.getElementById("email-error");
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email.value.trim()) {
          showError(email, emailError, "Email is required");
          isValid = false;
        } else if (!emailRegex.test(email.value)) {
          showError(email, emailError, "Please enter a valid email address");
          isValid = false;
        } else {
          clearError(email, emailError);
        }

        // If form is valid, show success message
        if (isValid) {
          submitBtn.classList.add("loading");
          submitBtn.textContent = "Sending...";

          // Simulate API call
          setTimeout(() => {
            // Hide form and show success message
            form.style.display = "none";
            successMessage.classList.add("visible");

            // Reset button state
            submitBtn.classList.remove("loading");
            submitBtn.textContent = "Send Reset Instructions";
          }, 1500);
        }
      });

      // Helper functions for showing/hiding errors
      function showError(input, errorElement, message) {
        input.classList.add("error");
        errorElement.textContent = message;
        errorElement.classList.remove("hidden");
      }

      function clearError(input, errorElement) {
        input.classList.remove("error");
        errorElement.classList.add("hidden");
      }

      // Real-time validation for better UX
      const inputs = document.querySelectorAll(".input");
      inputs.forEach((input) => {
        input.addEventListener("blur", function () {
          // Trigger validation when user leaves the field
          const event = new Event("submit", { cancelable: true });
          form.dispatchEvent(event);
        });
      });
    </script>
  </body>
</html>
