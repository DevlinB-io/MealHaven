<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - MealHaven</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../CSS/register_user.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-food">
      <div class="food-icon food-icon-1"></div>
      <div class="food-icon food-icon-2"></div>
      <div class="food-icon food-icon-3"></div>
      <div class="food-icon food-icon-4"></div>
      <div class="food-icon food-icon-5"></div>
    </div>
    <main class="auth-container" role="main">
      <section class="auth-card card" aria-labelledby="register-title">
        <header class="auth-header">
          <div class="brand-wrap" aria-hidden="true">
            <svg
              class="logo"
              viewBox="0 0 128 128"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M92 16c12 2 22 10 26 18-8 6-20 10-36 10-10 0-20-2-28-6 8-14 22-23 38-22z"
                fill="#22c55e"
                opacity="0.9"
              />
              <path d="M16 56l48-28 48 28v10l-48-26-48 26V56z" fill="#22c55e" />
              <path
                d="M28 58h72v50a6 6 0 0 1-6 6H34a6 6 0 0 1-6-6V58z"
                fill="#f97316"
                opacity="0.9"
              />
              <path
                d="M56 88a8 8 0 0 1 16 0v26H56V88z"
                fill="#1e293b"
                opacity="0.85"
              />
              <g fill="#1e293b" opacity="0.85">
                <rect x="44" y="66" width="10" height="10" rx="1.5" />
                <rect x="58" y="66" width="10" height="10" rx="1.5" />
              </g>
              <path
                d="M40 106V70c0-1.7 1.3-3 3-3s3 1.3 3 3v8h2v-8c0-1.7 1.3-3 3-3s3 1.3 3 3v36h-14z"
                fill="#1e293b"
                opacity="0.85"
              />
              <path
                d="M82 70c0-4.4 3.6-8 8-8s8 3.6 8 8c0 3.2-1.8 6-4.4 7.3V106H86V77.3c-2.6-1.3-4.4-4.1-4.4-7.3z"
                fill="#1e293b"
                opacity="0.85"
              />
            </svg>
            <div class="wordmark" aria-label="MealHaven">
              <span class="meal">MEAL</span>
              <span class="haven"> HAVEN</span>
            </div>
          </div>

          <h1 id="register-title">Create your account</h1>
          <p>Join MealHaven and start planning</p>
        </header>
        <form
          action="../PHP/register_user.php"
          method="POST"
          class="auth-form"
          novalidate
          id="register-form"
        >
          <label class="form-label">
            <span>First Name</span>
            <div class="input-wrap">
              <input
                type="text"
                name="first_name"
                class="input"
                placeholder="John"
                required
                autocomplete="given-name"
                id="first-name"
              />
            </div>
            <div class="form-error hidden" id="first-name-error"></div>
          </label>
          <label class="form-label">
            <span>Last Name</span>
            <div class="input-wrap">
              <input
                type="text"
                name="last_name"
                class="input"
                placeholder="Doe"
                required
                autocomplete="family-name"
                id="last-name"
              />
            </div>
            <div class="form-error hidden" id="last-name-error"></div>
          </label>
          <label class="form-label full">
            <span>Email</span>
            <div class="input-wrap">
              <input
                type="email"
                name="email"
                class="input"
                placeholder="your.email@example.com"
                required
                autocomplete="email"
                id="email"
              />
            </div>
            <div class="form-error hidden" id="email-error"></div>
          </label>
          <label class="form-label full">
            <span>Phone Number</span>
            <div class="input-wrap">
              <input
                type="tel"
                name="phone"
                class="input"
                placeholder="0712345678"
                required
                autocomplete="tel"
                pattern="^[0-9+\\-\\s()]{7,}$"
                id="phone"
              />
            </div>
            <div class="form-error hidden" id="phone-error"></div>
          </label>
          <label class="form-label">
            <span>Password</span>
            <div class="input-wrap">
              <input
                type="password"
                name="password"
                class="input"
                placeholder="Create a strong password"
                required
                autocomplete="new-password"
                minlength="8"
                id="pwd"
              />
              <button
                type="button"
                class="toggle"
                aria-label="Show password"
                data-target="pwd"
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
            <div class="password-strength">
              <div
                class="password-strength-meter"
                id="password-strength-meter"
              ></div>
            </div>
            <div class="form-error hidden" id="password-error"></div>
          </label>
          <label class="form-label">
            <span>Confirm Password</span>
            <div class="input-wrap">
              <input
                type="password"
                name="confirm_password"
                class="input"
                placeholder="Re-enter your password"
                required
                autocomplete="new-password"
                minlength="8"
                id="pwd2"
              />
              <button
                type="button"
                class="toggle"
                aria-label="Show password"
                data-target="pwd2"
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
            <div class="form-error hidden" id="confirm-password-error"></div>
          </label>
          <button type="submit" class="btn primary auth-submit" id="submit-btn">
            Create Account
          </button>
        </form>
        <div class="auth-divider-wrap" aria-hidden="true">
          <div class="auth-divider-line"></div>
          <div class="auth-divider-text">Already have an account?</div>
          <div class="auth-divider-line"></div>
        </div>
        <a href="login.html" class="auth-alt-btn">Log in</a>
        <p class="footer">
          By signing in, you agree to our <a href="terms.html">Terms</a> and
          <a href="privacy.html">Privacy Policy</a>.
        </p>
      </section>
    </main>

    <script>
      document.querySelectorAll(".toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-target");
          const input = document.getElementById(id);
          if (!input) return;
          const isPwd = input.type === "password";
          input.type = isPwd ? "text" : "password";
          const icon = btn.querySelector("svg");
          if (isPwd) {
            btn.setAttribute("aria-label", "Hide password");

            icon.innerHTML = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                             <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                             <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                             <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          } else {
            btn.setAttribute("aria-label", "Show password");
            icon.innerHTML = `<path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                             <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          }
        });
      });

      const passwordInput = document.getElementById("pwd");
      const strengthMeter = document.getElementById("password-strength-meter");

      passwordInput.addEventListener("input", function () {
        const value = this.value;
        let strength = 0;
        if (value.length >= 8) strength++;
        if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength++;
        if (value.match(/\d/)) strength++;
        if (value.match(/[^a-zA-Z\d]/)) strength++;

        strengthMeter.className = "password-strength-meter";
        if (value.length > 0) {
          if (strength <= 1) {
            strengthMeter.classList.add("strength-weak");
          } else if (strength === 2) {
            strengthMeter.classList.add("strength-fair");
          } else if (strength === 3) {
            strengthMeter.classList.add("strength-good");
          } else {
            strengthMeter.classList.add("strength-strong");
          }
        }
      });

      const form = document.getElementById("register-form");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", function (e) {
        let isValid = true;

        const firstName = document.getElementById("first-name");
        const firstNameError = document.getElementById("first-name-error");
        if (!firstName.value.trim()) {
          showError(firstName, firstNameError, "First name is required");
          isValid = false;
        } else {
          clearError(firstName, firstNameError);
        }

        const lastName = document.getElementById("last-name");
        const lastNameError = document.getElementById("last-name-error");
        if (!lastName.value.trim()) {
          showError(lastName, lastNameError, "Last name is required");
          isValid = false;
        } else {
          clearError(lastName, lastNameError);
        }

        const email = document.getElementById("email");
        const emailError = document.getElementById("email-error");
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email.value.trim()) {
          showError(email, emailError, "Email is required");
          isValid = false;
        } else if (!emailRegex.test(email.value)) {
          showError(email, emailError, "Please enter a valid email address");
          isValid = false;
        } else {
          clearError(email, emailError);
        }

        const phone = document.getElementById("phone");
        const phoneError = document.getElementById("phone-error");
        const phoneRegex = /^[0-9+\-\s()]{7,}$/;
        if (!phone.value.trim()) {
          showError(phone, phoneError, "Phone number is required");
          isValid = false;
        } else if (!phoneRegex.test(phone.value)) {
          showError(phone, phoneError, "Please enter a valid phone number");
          isValid = false;
        } else {
          clearError(phone, phoneError);
        }

        const password = document.getElementById("pwd");
        const passwordError = document.getElementById("password-error");
        if (!password.value) {
          showError(password, passwordError, "Password is required");
          isValid = false;
        } else if (password.value.length < 8) {
          showError(
            password,
            passwordError,
            "Password must be at least 8 characters"
          );
          isValid = false;
        } else {
          clearError(password, passwordError);
        }
        const confirmPassword = document.getElementById("pwd2");
        const confirmPasswordError = document.getElementById(
          "confirm-password-error"
        );
        if (!confirmPassword.value) {
          showError(
            confirmPassword,
            confirmPasswordError,
            "Please confirm your password"
          );
          isValid = false;
        } else if (password.value !== confirmPassword.value) {
          showError(
            confirmPassword,
            confirmPasswordError,
            "Passwords do not match"
          );
          isValid = false;
        } else {
          clearError(confirmPassword, confirmPasswordError);
        }

        if (!isValid) {
          e.preventDefault();
        }
      });
      function showError(input, errorElement, message) {
        input.classList.add("error");
        errorElement.textContent = message;
        errorElement.classList.remove("hidden");
      }

      function clearError(input, errorElement) {
        input.classList.remove("error");
        errorElement.classList.add("hidden");
      }

      const inputs = document.querySelectorAll(".input");
      inputs.forEach((input) => {
        input.addEventListener("blur", function () {
          const event = new Event("submit", { cancelable: true });
          form.dispatchEvent(event);
        });
      });
    </script>
  </body>
</html>
